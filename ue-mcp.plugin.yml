actionPrefix: "pie"
minServerVersion: "1.0.54"

nativeModule:
  uePluginName: PIE_Studio
  minBridgeApi: 1
  source: ue/Plugins/PIE_Studio
  handlers:
    inject_input: { description: "Single-frame Enhanced Input inject" }
    inject_input_start: { description: "Begin holding an Enhanced Input action" }
    inject_input_update: { description: "Change value of a running hold" }
    inject_input_stop: { description: "Stop a running hold or tape by id" }
    inject_input_tape: { description: "Play a per-frame value array through Enhanced Input" }
    record_arm: { description: "Arm the PIE input recorder" }
    record_disarm: { description: "Cancel an armed recording" }
    record_stop: { description: "Finalize in-flight recording" }
    record_status: { description: "Recorder state poll" }
    record_list: { description: "List recordings" }
    record_read: { description: "Read a recording artifact" }
    record_delete: { description: "Delete a recording directory" }
    mark: { description: "Insert a marker into the recording timeline" }
    replay_arm: { description: "Arm the PIE input replayer" }
    replay_disarm: { description: "Cancel an armed replay" }
    replay_stop: { description: "Stop in-flight replay" }
    replay_status: { description: "Replayer state poll" }
    record_diff: { description: "Diff two recordings" }
    snapshot: { description: "Snapshot a PIE actor's state" }
    profile_create: { description: "Create an observation profile" }
    profile_read: { description: "Read an observation profile" }
    profile_update: { description: "Update an observation profile" }
    profile_delete: { description: "Delete an observation profile" }
    profile_list: { description: "List observation profiles" }
    observe_arm: { description: "Arm the PIE observer" }
    observe_disarm: { description: "Cancel an armed observation" }
    observe_stop: { description: "Stop in-flight observation" }
    observe_status: { description: "Observer state poll" }
    observe_list: { description: "List observation runs" }
    observe_read: { description: "Read an observation run artifact" }
    anim_state: { description: "Get PIE anim instance state" }
    anim_properties: { description: "Read UPROPERTY values on a PIE actor's AnimInstance" }
    subsystem_state: { description: "Read UPROPERTY values on a running subsystem in PIE" }
    apply_damage: { description: "Apply damage to a PIE actor via UGameplayStatics" }

inject: {}
tasks: {}
flows: {}
